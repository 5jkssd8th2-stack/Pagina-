<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoLux - Agencia Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{background:#0f0f0f;color:white;}

header{
position:fixed;
width:100%;
top:0;
background:rgba(0,0,0,0.85);
backdrop-filter:blur(10px);
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:1000;
}

header h1{color:#00c6ff;font-size:22px;}

nav a{
color:white;
text-decoration:none;
margin-left:15px;
font-size:14px;
}

.hero{
height:100vh;
background:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1974&auto=format&fit=crop') center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero-content{
background:rgba(0,0,0,0.65);
padding:30px;
border-radius:20px;
}

.hero h2{font-size:28px;margin-bottom:10px;}
.hero p{margin-bottom:20px;}

.btn{
background:linear-gradient(45deg,#00c6ff,#0072ff);
padding:12px 25px;
border-radius:30px;
text-decoration:none;
color:white;
font-weight:600;
display:inline-block;
}

.section{padding:80px 20px;}

.section h2{text-align:center;margin-bottom:30px;}

.cars{
display:grid;
grid-template-columns:1fr;
gap:20px;
}

.card{
background:#1a1a1a;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
transition:0.3s;
cursor:pointer;
}

.card:hover{transform:translateY(-5px);}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-content{padding:15px;}

.price{color:#00c6ff;font-weight:600;}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
padding:20px;
z-index:2000;
}

.modal-content{
background:#1a1a1a;
border-radius:20px;
width:100%;
max-width:500px;
overflow:auto;
max-height:90vh;
padding-bottom:20px;
animation:fadeIn 0.3s ease;
}

.modal img{
width:100%;
height:250px;
object-fit:cover;
border-top-left-radius:20px;
border-top-right-radius:20px;
}

.modal-body{
padding:20px;
}

.close{
text-align:right;
font-size:22px;
cursor:pointer;
padding:10px;
}

@keyframes fadeIn{
from{opacity:0;transform:scale(0.9);}
to{opacity:1;transform:scale(1);}
}

footer{
text-align:center;
padding:15px;
font-size:13px;
background:#000;
margin-top:40px;
}

@media(min-width:768px){
.cars{grid-template-columns:repeat(3,1fr);}
.hero h2{font-size:40px;}
}
</style>
</head>

<body>

<header>
<h1>AutoLux</h1>
<nav>
<a href="#">Inicio</a>
<a href="#autos">Autos</a>
</nav>
</header>

<section class="hero">
<div class="hero-content">
<h2>Encuentra el Auto de tus Sueños</h2>
<p>Los mejores modelos al mejor precio</p>
<a href="#autos" class="btn">Ver Autos</a>
</div>
</section>

<section class="section" id="autos">
<h2>Autos Destacados</h2>

<div class="cars">

<div class="card" onclick="openModal('mustang')">
<img src="https://images.unsplash.com/photo-1552519507-da3b142c6e3d?q=80&w=1974&auto=format&fit=crop">
<div class="card-content">
<h3>Mustang GT 2023</h3>
<p class="price">$850,000 MXN</p>
</div>
</div>

<div class="card" onclick="openModal('bmw')">
<img src="https://images.unsplash.com/photo-1542362567-b07e54358753?q=80&w=1974&auto=format&fit=crop">
<div class="card-content">
<h3>BMW M4 Competition</h3>
<p class="price">$1,450,000 MXN</p>
</div>
</div>

<div class="card" onclick="openModal('audi')">
<img src="https://images.unsplash.com/photo-1619767886558-efdc259cde1a?q=80&w=1974&auto=format&fit=crop">
<div class="card-content">
<h3>Audi RS7</h3>
<p class="price">$1,890,000 MXN</p>
</div>
</div>

</div>
</section>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<div class="close" onclick="closeModal()">✕</div>
<img id="modal-img">
<div class="modal-body" id="modal-body"></div>
</div>
</div>

<footer>
© 2026 AutoLux - Agencia Premium
</footer>

<script>
function openModal(car){
const modal=document.getElementById("modal");
const img=document.getElementById("modal-img");
const body=document.getElementById("modal-body");

if(car==="mustang"){
img.src="https://images.unsplash.com/photo-1552519507-da3b142c6e3d?q=80&w=1974&auto=format&fit=crop";
body.innerHTML=`
<h2>Mustang GT 2023</h2>
<p><strong>Motor:</strong> 5.0L V8</p>
<p><strong>Potencia:</strong> 450 HP</p>
<p><strong>0-100 km/h:</strong> 4.3s</p>
<p><strong>Transmisión:</strong> Automática 10 vel.</p>
<br>
<a class="btn" href="#">Solicitar Información</a>
`;
}

if(car==="bmw"){
img.src="https://images.unsplash.com/photo-1542362567-b07e54358753?q=80&w=1974&auto=format&fit=crop";
body.innerHTML=`
<h2>BMW M4 Competition</h2>
<p><strong>Motor:</strong> 3.0L Twin Turbo</p>
<p><strong>Potencia:</strong> 503 HP</p>
<p><strong>0-100 km/h:</strong> 3.8s</p>
<p><strong>Transmisión:</strong> Automática 8 vel.</p>
<br>
<a class="btn" href="#">Solicitar Información</a>
`;
}

if(car==="audi"){
img.src="https://images.unsplash.com/photo-1619767886558-efdc259cde1a?q=80&w=1974&auto=format&fit=crop";
body.innerHTML=`
<h2>Audi RS7</h2>
<p><strong>Motor:</strong> 4.0L V8 Biturbo</p>
<p><strong>Potencia:</strong> 591 HP</p>
<p><strong>0-100 km/h:</strong> 3.6s</p>
<p><strong>Transmisión:</strong> Automática 8 vel.</p>
<br>
<a class="btn" href="#">Solicitar Información</a>
`;
}

modal.style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

window.onclick=function(e){
const modal=document.getElementById("modal");
if(e.target===modal){
modal.style.display="none";
}
}
</script>

</body>
</html>
